<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro da Empresa</title>
  <link rel="stylesheet" href="cadastro.css">
</head>
<body>

  <div class="principal-login">

    
    <div class="esquerda-login">
      <div class="card-login">
        <h1>Cadastro da Empresa</h1>
        <p class="subtitulo">Crie sua conta de administrador informando os dados abaixo</p>

        <form>

          <div class="campo">
            <label>CNPJ *</label>
            <input type="text" placeholder="00.000.000/0000-00" maxlength="18">
          </div>

          <div class="campo">
            <label>E-mail Corporativo *</label>
            <input type="email" placeholder="admin@suempresa.com.br">
          </div>

          <div class="campo">
            <label>Senha *</label>
            <input type="password" placeholder="Digite sua senha">
          </div>

          <div class="campo">
            <label>Confirmar Senha *</label>
            <input type="password" placeholder="Confirme sua senha">
          </div>

          <button type="button" class="btn-cadastro">CADASTRAR EMPRESA</button>
        </form>

        <div class="ja-tenho-conta">
          Já possui uma conta? <a href="login.html">Fazer Login</a>
        </div>
      </div>
    </div>

    
    <div class="direita-login">
      <div class="overlay">
        <h1>Bem-vindo!</h1>
        <p>Gerencie sua empresa de forma simples e eficiente.<br>Comece cadastrando sua empresa agora.</p>
      </div>
    </div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Ganho SIMA</title>
</head>
<body>
    
    <h1>Descubra o potencial financeiro do seu estoque</h1>

    Quantos pallets cabem no seu estoque (em média)? <br>
    <input type="number" id="ipt_pallets"> <br><br>

    Quantos corredores ou vãos você possui (em média)? <br>
    <input type="number" id="ipt_vaos"> <br><br>

    <button onclick="calcular()">Calcular potencial</button> <br><br>

    <div id="div_mensagem"></div>

</body>
</html>

<script>

function calcular(){

    let pallets = Number(ipt_pallets.value);
    let vaos = Number(ipt_vaos.value);

   
    let valorMedioPallet = 1000; 
    let valorEstoque = pallets * valorMedioPallet;

    
    let baseCalculo = valorEstoque * 0.2;

    let ganhoMensal = baseCalculo * 0.5;
    let ganhoAnual = ganhoMensal * 12;

    div_mensagem.innerHTML = `

    <h2 style="color:green;">
    Potencial de ganho mensal com nosso produto: R$ ${ganhoMensal.toLocaleString()}
    </h2>

    Ganho estimado anual com nosso produto:<br>
    <b>R$ ${ganhoAnual.toLocaleString()}</b>

    <br><br>

    <span style="color:gray;">
    Simulação baseada em características operacionais informadas
    </span>
    `;
}

</script>

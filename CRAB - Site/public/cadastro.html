<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro da Empresa</title>
  <link rel="stylesheet" href="styles/cadastro.css">
</head>
<body>

  <div class="principal-login">

    
    <div class="esquerda-login">
      <div class="card-login">
        <h1>Cadastro da Empresa</h1>
        <p class="subtitulo">Crie sua conta de administrador informando os dados abaixo</p>

        <form>

          <div class="campo">
            <label>CNPJ *</label>
            <input  id = "CNPJ" type="text" placeholder="00.000.000/0000-00">
          </div>

          <div class="campo">
            <label>E-mail Corporativo *</label>
            <input  id = "emailc" type="email" placeholder="admin@suempresa.com.br">
          </div>

          <div class="campo">
            <label>Senha *</label>
            <input id="pass" type="password" placeholder="Digite sua senha">
          </div>

          <div class="campo">
            <label>Confirmar Senha *</label>
            <input id="conpass" type="password" placeholder="Confirme sua senha">
          </div>

          <button onclick="cadastrar()" type="button" class="btn-cadastro">CADASTRAR EMPRESA</button>
        </form>

        <div class="ja-tenho-conta">
          Já possui uma conta? <a href="login.html">Fazer Login</a>
        </div>
      </div>
    </div>

    
    <div class="direita-login">
      <div class="overlay">
        <h1>Bem-vindo!</h1>
        <p>Gerencie sua empresa de forma simples e eficiente.<br>Comece cadastrando sua empresa agora.</p>
      </div>
    </div>

  </div>

</body>
</html>
<script>

function cadastrar(params) {
  let Email = emailc.value;
  let Pass = pass.value;
  let ConPass = conpass.value;
  let cnpjValor = CNPJ.value;

  if (Email == "" || Pass == "" || ConPass == "" || cnpjValor == "") {
    alert("Preencha todos os campos obrigatórios.");
    return;
  } else if (Pass !== ConPass) {
    alert("As senhas não coincidem.");
    return;
  }

  if (!Email.includes("@") || !Email.includes(".com")) {
    alert("Por favor, insira um e-mail válido.");
    return;
  } else if (isNaN(cnpjValor.replace(/\D/g, "")) || cnpjValor.replace(/\D/g, "").length !== 14) {
    alert("Por favor, insira um CNPJ válido (apenas números, 14 dígitos).");
    return;
  }

  /*replace(/\D/g, "") -- REMOVE TUDO QUE NAO É NUMERO \D/G REMOVE TUDO QUE NAO SEJA DIGITO E APLICA TODA STRING */

  if (Pass.length < 6) {
    alert("A senha deve conter pelo menos 6 caracteres.");
    return;
  } 
    
  if (Pass.length > 20) {
    alert("A senha deve conter no máximo 20 caracteres.");
    return;
  }

  
  alert("Cadastro realizado com sucesso!");

}

</script>

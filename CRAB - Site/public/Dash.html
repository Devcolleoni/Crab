<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f4;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .box {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
        }

        .box h3 {
            margin: 0 0 16px;
            font-size: 14px;
            color: #444;
            font-weight: 500;
        }

        .box-chart {
            position: relative;
            width: 100%;
            height: 220px;
        }
    </style>
</head>
<body>

    <div class="box">
        <h3>Fluxo de Entrada e Saída</h3>
        <div class="box-chart">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <div class="box">
        <h3>Taxa de Abastecimento — últimos 7 dias</h3>
        <div class="box-chart">
            <canvas id="chartAbastecimento"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: {
                labels: ['12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00','23:00'],
                datasets: [
                    {
                        label: 'Abastecido',
                        data: [30,29,27,25,22,23,21,20,19,18,17,16],
                        borderColor: 'red',
                        tension: 0.3
                    },
                    {
                        label: 'Não abastecido',
                        data: [10,15,12,18,20,14,16,13,11,9,8,7],
                        borderColor: 'green',
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } },
                plugins: { legend: { position: 'top' } }
            }
        });
    </script>

    <script>
        new Chart(document.getElementById('chartAbastecimento'), {
            type: 'line',
            data: {
                labels: ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'],
                datasets: [
                    {
                        label: '% abastecido',
                        data: [78,82,75,68,61,70,73],
                        borderColor: '#185fa5',
                        backgroundColor: 'rgba(24,95,165,0.12)',
                        borderWidth: 2.5,
                        pointRadius: 4,
                        pointBackgroundColor: '#185fa5',
                        fill: true,
                        tension: 0.35
                    },
                    {
                        label: 'Meta 80%',
                        data: [80,80,80,80,80,80,80],
                        borderColor: '#aaaaaa',
                        borderWidth: 1.5,
                        borderDash: [6,4],
                        pointRadius: 0,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: true },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}%` }
                    }
                },
                scales: {
                    x: { grid: { color: 'rgba(0,0,0,.06)' }, ticks: { color: '#888', font: { size: 11 } } },
                    y: { min: 50, max: 100, grid: { color: 'rgba(0,0,0,.06)' }, ticks: { color: '#888', font: { size: 11 }, callback: v => v + '%' } }
                }
            }
        });
    </script>

</body>
</html>

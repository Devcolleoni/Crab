<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAB - Adicionar Usuário</title>
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="fundo-adduser">
    <div class="sidebar">
        <div class="logo">
            <span>CRAB</span>
        </div>
        <div class="info-usuario">
            <p>Bem-vindo(a), <strong>Usuário</strong></p>
        </div>

        <nav class="menu">
            <a href="../home.html"><i class="bi bi-house"></i> Início</a>
            <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Painel</a>
            <a href="configuração.html"><i class="bi bi-gear"></i> Configurações</a>
            <a href="ajuda.html"><i class="bi bi-question-circle"></i> Ajuda</a>
            <a href="adduser.html" class="ativo"><i class="bi bi-person-plus"></i> Adicionar Usuário</a>
        </nav>

        <div class="rodape-sidebar">
            <a href="../login.html">Sair <i class="bi bi-box-arrow-right"></i></a>
        </div>
    </div>
        <div class="envoltorio-config">
            <div class="cartao-config">
                <div class="cabecalho-adduser">
                    <i class="bi bi-person-plus-fill"></i>
                    <div>
                        <h2>Adicionar Novo Usuário</h2>
                        <p>Crie um usuário novinho em folha.</p>
                    </div>
                </div>

                <div class="config-form">
                    <div class="campo">
                        <label for="nomeUsuario">Nome de Usuário*</label>
                        <input type="text" id="ipt_nomeUsuario" placeholder="Nome de Usuário">
                    </div>

                    <div class="campo">
                        <label for="novaSenha">CPF*</label>
                        <input type="text" id="ipt_cpf" placeholder="123.456.789-10">
                    </div>

                    <div class="campo">
                        <label for="email">Email*</label>
                        <input type="email" id="ipt_email" placeholder="seu@email.com">
                    </div>

                    <div class="campo">                      
                        <label for="senhaAtual">Senha*</label>
                        <input type="password" id="ipt_senha" placeholder="Digite sua senha">
                    </div>

                    <div class="campo">
                        <label for="confirmarSenha">Confirmar Senha*</label>
                        <input type="password" id="ipt_confirmarSenha" placeholder="Confirme a senha">
                    </div>
                    <div class="botoes-adduser">

                        <button class="botao-adduser" onclick="adicionarUsuario()">
                            Adicionar
                        </button>

                        <button class="botao-adduser transparente" onclick="cancelar()">
                            Cancelar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    function adicionarUsuario(){

        let nomeUsuario = ipt_nomeUsuario.value;
        let cpf = ipt_cpf.value;
        let email = ipt_email.value;
        let senha = ipt_senha.value;
        let confirmarSenha = ipt_confirmarSenha.value;


    }

    function cancelar(){

        document.getElementById("ipt_nomeUsuario").reset();
        document.getElementById("ipt_cpf").reset();
        document.getElementById("ipt_email").reset();
        document.getElementById("ipt_senha").reset();
        document.getElementById("ipt_confirmarSenha").reset();
    }
</script>

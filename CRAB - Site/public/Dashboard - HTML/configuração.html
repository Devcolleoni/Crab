<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>CRAB - Configurações</title>
</head>
<body>
  <div id="header">
        <div class="container">
            <a class="logo" href="#home">CRAB</a>
            <ul class="navbar">
                <p>Bem Vindo(a), <span>Usuário</span></p>
            <li><a href="../home.html">Ínicio</a></li>
            <li><a href="dashboard.html">Painel</a></li>
            <li><a href="configuração.html">Configurações</a></li>
            <li><a href= "ajuda.html">Ajuda</a></li>
            </ul>
            
            <div class="profile">
                <a href="../login.html">Sair</a>
                <div class="profile-account">
                <i class="bi bi-person-circle"></i>
                </div>
            </div>
        </div>
    </div>

<div class="principal-login">

        <div class="esquerda-perfil">
            <div class="card-perfil">

                <h1>Perfil</h1>

                <div class="campo">
                    <label>Usuário</label>
                    <input type="text" id="usuario" placeholder="Digite seu usuário">
                </div>

                  <div class="campo">
                    <label>Email</label>
                    <input type="text" id="email" placeholder="Digite seu email">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha">
                </div>


                <button class="btn-login" onclick="">Salvar Alterações</button>

            </div>
        </div>

        <div class="direita-perfil">
            <div class="overlay">
                <h1>Logística Inteligente</h1>
                <p>Controle, eficiência e inovação para sua operação</p>
            </div>
        </div>

    </div>
    
</body>
</html>

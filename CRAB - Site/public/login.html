<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAB Logística - Login</title>
    <link rel="stylesheet" href="styles/login.css">
    <a href=></a>
</head>

<body>

    <div class="principal-login">

        <div class="esquerda-login">
            <div class="card-login">

                <h1>CRAB</h1>
                <p class="subtitulo">Acesse sua conta</p>

                <div class="campo">
                    <label>Usuário</label>
                    <input type="text" id="usuario" placeholder="Digite seu usuário">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha">
                </div>

                <div class="opcoes">
                    <label class="relembrar">
                        <input id="lembrar" type="checkbox"> Lembrar senha
                    </label>
                    <a href="#" class="esqueci">Esqueci a senha</a>
                </div>

                <button class="btn-login" onclick="entrar()">Entrar</button>

                <p id="mensagem"></p>
                <div class="cadastro-link">
                    <p>Não tem conta?
                        <a href="cadastro.html" class="link-cadastro">Cadastre-se</a>
                    </p>
                </div>

            </div>
        </div>

        <div class="direita-login">
            <div class="overlay">
                <h1>Logística Inteligente</h1>
                <p>Controle, eficiência e inovação para sua operação</p>
            </div>
        </div>

    </div>

</body>

</html>
<script>
    function entrar() {

        let user = usuario.value;
        let senhaDigitada = senha.value;

        if (user == "" || senhaDigitada == "") {
            mensagem.innerHTML = "Preencha todos os campos!";
            mensagem.style.color = "red";
            return;
        } if (!user.includes("@") || !user.includes(".com")) {
            mensagem.innerHTML = "Digite um e-mail válido!";
            mensagem.style.color = "red";
            return;
        }

        if (user == "Crab@institucional.com.br" && senhaDigitada == "Crab777") {

            if (lembrar.checked) {
                localStorage.setItem("email", user);
                localStorage.setItem("senha", senhaDigitada);
            } else {
                localStorage.removeItem("email");
                localStorage.removeItem("senha");
            }

            mensagem.innerHTML = "Login realizado com sucesso!";
            mensagem.style.color = "green";
            alert("Bem vindo " + user);
            
            window.location.href = `../public/Dashboard - HTML/dashboard.html`;
         
        } else {
            mensagem.innerHTML = "Usuário ou senha inválidos!";
            mensagem.style.color = "red";
        }

    }

    /*Executa qnd a pagina termina de carregar */
    
    window.onload = function () {
        if (localStorage.getItem("email")) {
            usuario.value = localStorage.getItem("email");
            senha.value = localStorage.getItem("senha");
            lembrar.checked = true;
        }
    }
</script>

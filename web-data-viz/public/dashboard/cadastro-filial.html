<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Filial</title>
    <link rel="stylesheet" href="../styles/matriz.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

    <body class="fundo-adduser">
   <div class="sidebar">
        <div class="logo">
            <span>CRAB</span>
        </div>
        <div class="info-usuario">
            <p>Bem-vindo(a), <strong>Usuário</strong></p>
        </div>

        <nav class="menu">
            <a href="../home.html"><i class="bi bi-house"></i> Início</a>
            <a href="matriz.html"><i class="bi bi-speedometer2"></i> Painel Filiais</a>
            <a href="gerenciamento-Matriz.html" class="ativo"><i class="bi bi-gear"></i> Gerenciar Filiais</a>
            <a href="ajuda.html"><i class="bi bi-question-circle"></i> Ajuda</a>
        </nav>

        <div class="rodape-sidebar">
            <a href="../login.html">Sair <i class="bi bi-box-arrow-right"></i></a>
        </div>
    </div>

    <div class="envoltorio-config">
        <div class="cartao-config">
            <div class="cabecalho-adduser">
                <i class="bi bi-person-plus-fill"></i>
                <div>
                    <h2>Adicionar Nova Filial</h2>
                    <p>Cadastre uma nova filial e seu Gerente</p>
                </div>
            </div>

            <div class="config-form">
                <div class="campo">
                    <label for="nomeUsuario">Razão Social:</label>
                    <input type="text" id="ipt_razaoSocial" placeholder="Nome Filial" oninput="validarRazaoSocial()">
                </div>

                <div class="campo">
                    <label for="novaSenha">Cnpj:</label>
                    <input type="text" id="ipt_cnpj" placeholder="00.000.000/0000-00" oninput="validarCNPJ()">
                </div>

                <div class="campo">
                    <label for="email">Cep:</label>
                    <input type="text" id="ipt_cep" placeholder="00000-000" oninput="validarCNPJ()">
                </div>

                </div>
                <div class="botoes-adduser">

                    <button class="botao-adduser"><a href="cadastro-gerente.html"></a></button>

                </div>
            </div>
        </div>
    </div>
    </div>
    
</body>
</html>

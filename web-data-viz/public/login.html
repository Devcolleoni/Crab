<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAB Logística - Login</title>
    <link rel="stylesheet" href="styles/login.css">

    <script defer src="./js/login.js"></script>

    <a href=''></a>
</head>

<body>

    <div class="principal-login">

        <div class="esquerda-login">
            <div class="card-login">

                <h1 class="logo">CRAB</h1>
                <p class="subtitulo">Acesse sua conta</p>

                <div class="campo">
                    <label>Usuário / Email</label>
                    <input type="text" id="ipt_usuario" placeholder="seuemail@dominio.com">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="ipt_senha" placeholder="Digite sua senha">
                </div>

                <div class="campo">
                    <label>Código da Empresa</label>
                    <input type="text" id="ipt_codigo_empresa" placeholder="#E352L3">
                </div>

                <!-- <div class="opcoes">
                    <label class="relembrar">
                        <input id="lembrar" type="checkbox"> Lembrar senha
                    </label>
                    <a href="#" class="esqueci">Esqueci a senha</a>
                </div> -->

                <button class="btn-login" onclick="entrar()">Entrar</button>

                <p id="mensagem"></p>
                <div class="cadastro-link">
                    <p>Não tem conta?
                        <a href="home.html#contato" class="link-cadastro">Seja o nosso parceiro</a>
                    </p>
                </div>

            </div>
        </div>

        <div class="direita-login">
            <div class="overlay">
                <h1>Logística Inteligente</h1>
                <p>Controle, eficiência e inovação para sua operação</p>
            </div>
        </div>

    </div>

</body>

</html>

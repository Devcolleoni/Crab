<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRAB Logística - Login</title>
    <link rel="stylesheet" href="styles/login.css">

    <script defer src="./js/login.js"></script>

    <a href=''></a>
</head>

<body>

    <div class="principal-login">

        <div class="esquerda-login">
            <div class="card-login">

                <h1 class="logo">CRAB</h1>
                <p class="subtitulo">Acesse sua conta</p>

                <div class="campo">
                    <label>Usuário / Email</label>
                    <input type="text" id="ipt_usuario" placeholder="seuemail@dominio.com">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" id="ipt_senha" placeholder="Digite sua senha">
                </div>

            
                <button class="btn-login" onclick="entrar()">Entrar</button>

                <p id="mensagem"></p>
                <div class="cadastro-link">
                    <p>Não tem conta?
                        <a href="home.html#contato" class="link-cadastro">Seja o nosso parceiro</a>
                    </p>
                </div>

            </div>
        </div>

        <div class="direita-login">
            <div class="overlay">
                <h1>Logística Inteligente</h1>
                <p>Controle, eficiência e inovação para sua operação</p>
            </div>
        </div>

    </div>

</body>
<script>

    function entrar() {

        let EmailVar = ipt_usuario.value
        let SenhaVar = ipt_senha.value  

         fetch("/usuarios/autenticar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                emailServer: EmailVar,
                senhaServer: SenhaVar
            })
        }).then(function(resposta) {
            if (resposta.ok) {
                resposta.json().then(json => {  
                    sessionStorage.EMAIL_USUARIO = json.email
                    sessionStorage.NOME_USUARIO = json.nome
                    sessionStorage.ID_USUARIO = json.id
                    setTimeout(() => window.location = "index.html", 1000)
                    mensagem.style.color =  `green`
                    mensagem.innerHTML = `Login feito com sucesso! redirecionando para a tela inicial.`
                    localStorage.setItem('logado', 'true')
                })
            } else {
                resposta.text().then(texto => {
                    mensagem.innerHTML = "Email e/ou senha inválido(s)"
                })
            }
        }).catch(erro => console.log(erro))
    }





    
</script>
</html>
